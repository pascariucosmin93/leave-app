<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { max-width: 420px; width:100%; }
  </style>
  <script>
    function getToken() {
      const p = new URLSearchParams(window.location.search);
      return p.get('token') || '';
    }

    async function submitReset(e) {
      e.preventDefault();
      const token = getToken();
      const pass = document.getElementById('newPass').value;
      const pass2 = document.getElementById('newPass2').value;
      if (!token) { alert('Missing token or invalid link.'); return; }
      if (!pass || pass.length < 6) { alert('Password must be at least 6 characters long.'); return; }
      if (pass !== pass2) { alert('Passwords do not match.'); return; }

      try {
        const res = await fetch('/api/password/reset/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pass })
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || 'Could not reset the password.');
          return;
        }
        alert('Password reset completed. Redirecting to login.');
        window.location.href = '/index.html';
      } catch (err) {
        alert('Network error. Please try again.');
      }
    }
  </script>
  <base href="/">
  <script>
    // Keep the link working when the frontend is served from the NGINX root.
  </script>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;">
</head>
<body class="bg-light">
  <div class="card shadow p-4">
    <h4 class="mb-3">🔐 Reset Password</h4>
    <form onsubmit="submitReset(event)">
      <div class="mb-3">
        <label class="form-label" for="newPass">New password</label>
        <input id="newPass" type="password" class="form-control" required minlength="6">
      </div>
      <div class="mb-3">
        <label class="form-label" for="newPass2">Confirm password</label>
        <input id="newPass2" type="password" class="form-control" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary w-100">Reset Password</button>
      <a class="btn btn-link w-100 mt-2" href="/index.html">Back to login</a>
    </form>
  </div>
</body>
</html>
