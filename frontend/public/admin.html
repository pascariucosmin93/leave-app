<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚙️ Admin - Leave Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <!-- Admin login -->
  <div class="card shadow-lg p-4" style="width: 400px;" id="adminLoginBox">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="mb-0">⚙️ Admin Login</h3>
      <button id="toggleDark" class="btn btn-sm btn-outline-secondary">🌙</button>
    </div>

    <form onsubmit="adminLogin(); return false;">
      <input type="text" class="form-control mb-2" value="admin" disabled>
      <input type="password" class="form-control mb-2" id="adminPassword" placeholder="Password" required>
      <button type="submit" class="btn btn-dark w-100 mb-2">Login</button>
      <button type="button" class="btn btn-secondary w-100" onclick="window.location.href='index.html'">⬅ Back</button>
    </form>
  </div>

  <!-- Admin app -->
  <div class="container d-none" id="adminApp">
    <div class="card shadow-sm p-3">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
        <h4 class="mb-0">User Requests</h4>
        <div class="d-flex align-items-center gap-2">
          <span id="discordStatus" class="badge bg-success">Discord notifications enabled</span>
          <button id="discordToggleBtn" class="btn btn-outline-warning btn-sm" onclick="toggleDiscordNotifications()">
            🔕 Disable Discord notifications
          </button>
        </div>
      </div>
      <div class="d-flex flex-wrap justify-content-end gap-2 mt-3">
        <button class="btn btn-success btn-sm" onclick="bulkUpdateLeaves('approved')">✅ Approve All</button>
        <button class="btn btn-danger btn-sm" onclick="bulkUpdateLeaves('rejected')">🚫 Reject All</button>
      </div>
      <ul id="adminLeaves" class="list-group mt-3"></ul>
    </div>

    <div class="text-center mt-3">
      <button class="btn btn-secondary" onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <script src="script.js?v=12"></script>
  <script>
    // 🌙 Dark Mode toggle
    document.getElementById("toggleDark").addEventListener("click", function() {
      document.body.classList.toggle("dark-mode");
      this.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
    });
  </script>
</body>
</html>
