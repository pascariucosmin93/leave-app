name: Tests and Docker Validation

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov ruff

      - name: Run Ruff
        run: ruff check backend tests

      - name: Run tests with coverage
        env:
          UNIT_TESTING: "1"
          DATABASE_URL: sqlite:///test-ci.db
          BOOTSTRAP_DB: "false"
        run: pytest --cov=backend --cov-report=term-missing --cov-fail-under=80 -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate backend Docker build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false

      - name: Validate frontend Docker build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false

      - name: Validate kube-security Docker builds
        run: |
          docker build -t ddos-detector ./kube-security/ddos-detector
          docker build -t cleanup-blocked-ips ./kube-security/cleanup-blocked-ips
