name: Security Scan

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scan dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install bandit pip-audit checkov

      - name: Run Bandit
        run: bandit -r backend

      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt

      - name: Run Checkov on Kubernetes and CI config
        run: checkov -d . --quiet --skip-path .venv --skip-path archive

      - name: Run Trivy filesystem scan
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            docker.io/aquasec/trivy:0.65.0 \
            fs \
            --ignorefile /workspace/.trivyignore \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            /workspace

      - name: Build backend image for Trivy
        run: docker build --pull --no-cache -t leave-app-backend-scan ./backend

      - name: Scan backend image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/workspace" \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            docker.io/aquasec/trivy:0.65.0 \
            image \
            --ignorefile /workspace/.trivyignore \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            leave-app-backend-scan
