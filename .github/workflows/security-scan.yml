name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scan dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install bandit pip-audit checkov

      - name: Run Bandit
        run: bandit -r backend

      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt

      - name: Run Checkov on Kubernetes and CI config
        run: checkov -d . --quiet --skip-path .venv --skip-path archive

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Build backend image for Trivy
        run: docker build -t leave-app-backend-scan ./backend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: leave-app-backend-scan
          scan-type: image
          severity: CRITICAL,HIGH
          exit-code: '1'
