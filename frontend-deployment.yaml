apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.namespace }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  strategy:
    {{- toYaml .Values.backend.strategy | nindent 4 }}
  selector:
    matchLabels:
      app: {{ .Values.backend.selectorLabel }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.selectorLabel }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.backend.name }}
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          ports:
            - containerPort: {{ .Values.backend.port }}
          {{- if .Values.backend.env }}
          env:
            {{- toYaml .Values.backend.env | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.secretName }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- if .Values.backend.probes.startup }}
          startupProbe:
            {{- toYaml .Values.backend.probes.startup | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.backend.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.probes.readiness | nindent 12 }}
