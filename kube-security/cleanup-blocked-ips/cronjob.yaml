apiVersion: batch/v1
kind: CronJob
metadata:
  name: ddos-detector-cleanup
  namespace: monitoring
# checkov:skip=CKV_K8S_43: This image is published externally and current deployment flow tracks it by immutable tag outside this repository.
spec:
  schedule: "*/5 * * * *"                # rulează la fiecare 5 minute
  concurrencyPolicy: Forbid              # împiedică suprapunerea joburilor
  successfulJobsHistoryLimit: 2          # păstrează doar ultimele 2 joburi reușite
  failedJobsHistoryLimit: 2              # păstrează doar ultimele 2 joburi eșuate
  startingDeadlineSeconds: 60            # permite întârziere de max 60s la pornire
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: calico-admin
          automountServiceAccountToken: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          imagePullSecrets:
            - name: regcred
          containers:
            - name: cleanup
              image: cosminregistrydev.azurecr.io/kube-security-clean-ip:1b262e
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "150m"
                  memory: "128Mi"
              env:
                - name: DISCORD_WEBHOOK
                  valueFrom:
                    secretKeyRef:
                      name: kube-security-webhooks
                      key: DISCORD_WEBHOOK
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
