apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-only-needed
  namespace: employee-leave
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 🔹 Permite trafic de la frontend (același namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: employee-leave
          podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 5000

    # 🔹 Permite acces de la monitoring (Prometheus etc.)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 5000

  egress:
    # 🔹 DNS queries către kube-system (CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # 🔹 Acces MySQL oriunde (DB externă)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 3306

    # 🔹 Permite acces HTTPS (ex: Discord webhooks)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
